services:
  - type: web
    name: mitsumori-app
    env: python
    plan: free
    pythonVersion: 3.10
    buildCommand: "pip install -r requirements.txt"
    startCommand: "streamlit run app.py --server.port $PORT --server.address 0.0.0.0"
    envVars:
      - key: SECRET_KEY
        generateValue: true
